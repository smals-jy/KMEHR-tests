name: Can build documentation

on:
  push:
    paths: 
      - 'documentation/**'
  workflow_dispatch:

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
      - name: 🤖 Setup Pages
        uses: actions/configure-pages@v6
        id: configure
      - name: 🔨 Build
        env:
          GITHUB_ORIGIN: ${{ steps.configure.outputs.origin }}
          GITHUB_BASE: ${{ steps.configure.outputs.base_path }}
        run: |
          cd documentation
          yarn
          yarn build
